<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sawubona World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --sa-red: #E03C31;
            --sa-green: #007749;
            --sa-blue: #001489;
            --sa-gold: #FFB81C;
            --white: #FFFFFF;
            --cream: #f8f1e7;
            --overlay: rgba(0, 0, 0, 0.45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: var(--white);
            overflow: hidden;
        }

        .hero-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .bg-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .background-media {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center;
            animation: kenburns 30s ease-in-out infinite alternate;
        }

        @keyframes kenburns {
            0%   { transform: scale(1) translate(0, 0); }
            50%  { transform: scale(1.1) translate(-1%, -0.5%); }
            100% { transform: scale(1.15) translate(1%, 0.5%); }
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--overlay);
            z-index: -1;
        }

        .shimmer-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(
                110deg,
                transparent 20%,
                rgba(255, 184, 28, 0.08) 48%,
                rgba(255, 184, 28, 0.12) 50%,
                rgba(255, 184, 28, 0.08) 52%,
                transparent 80%
            );
            z-index: -1;
            pointer-events: none;
            animation: shimmer 8s linear infinite;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0%   { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .wave-container {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 10vh;
            overflow: hidden;
            line-height: 0;
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        .wave-container svg {
            position: relative;
            display: block;
            width: calc(150% + 1.3px);
            height: 100%;
            animation: move-wave 15s linear infinite;
        }

        @keyframes move-wave {
            0%   { transform: translateX(0); }
            50%  { transform: translateX(-25%); }
            100% { transform: translateX(0); }
        }

        .particles-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            width: 4px; height: 4px;
            animation: drift var(--duration) linear infinite;
            opacity: 0;
        }

        @keyframes drift {
            0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.6; }
            100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
        }

        .hero-content {
            z-index: 1;
            padding: 2rem;
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        h1 {
            font-weight: 900;
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.9;
            letter-spacing: -0.04em;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            cursor: default;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: breathe 5s ease-in-out infinite alternate 1.5s;
        }

        @keyframes breathe {
            from { transform: scale(1); }
            to   { transform: scale(1.02); }
        }

        h1 .exclamation {
            color: var(--sa-green);
            text-shadow: 4px 4px 0px var(--sa-gold);
            display: inline-block;
        }

        .flag-line {
            height: 4px;
            width: 160px;
            margin: 1rem 0 2rem 0;
            background: linear-gradient(to right,
                var(--sa-red) 20%,
                var(--white) 20% 40%,
                var(--sa-green) 40% 60%,
                var(--white) 60% 80%,
                var(--sa-blue) 80%);
            border-radius: 2px;
            transition: width 0.6s ease;
            animation: flagShimmer 3s ease-in-out infinite alternate 1s;
        }

        @keyframes flagShimmer {
            0%   { filter: brightness(1) drop-shadow(0 0 0px var(--sa-gold)); }
            100% { filter: brightness(1.2) drop-shadow(0 0 8px var(--sa-gold)); }
        }

        .subtitle {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            font-weight: 300;
            color: var(--cream);
            letter-spacing: 0.1em;
            animation: float 4s ease-in-out infinite alternate;
        }

        @keyframes float {
            0%   { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }

        .hero-content:hover h1 {
            transform: scale(1.03);
            animation-play-state: paused;
        }

        .hero-content:hover .flag-line {
            width: 300px;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
            .background-media {
                transform: none !important;
            }
        }

        @media (max-width: 600px) {
            .flag-line { width: 100px; height: 3px; }
        }
    </style>
</head>
<body>
    <main class="hero-container">
        <div class="bg-wrapper">
            <img src="https://pub.hyperagent.com/api/published/0bOYWaFG0RPsGzr4VAvclg/4006d527-189b-4e3d-a277-eab943bacc15.png" alt="Cape Town ocean and Table Mountain landscape" class="background-media">
        </div>

        <div class="overlay"></div>
        <div class="shimmer-overlay"></div>

        <div class="particles-container">
            <div class="particle" style="left: 10%; --duration: 12s; animation-delay: 0s;"></div>
            <div class="particle" style="left: 25%; --duration: 15s; animation-delay: 2s;"></div>
            <div class="particle" style="left: 40%; --duration: 10s; animation-delay: 4s;"></div>
            <div class="particle" style="left: 55%; --duration: 18s; animation-delay: 1s;"></div>
            <div class="particle" style="left: 70%; --duration: 14s; animation-delay: 6s;"></div>
            <div class="particle" style="left: 85%; --duration: 11s; animation-delay: 3s;"></div>
            <div class="particle" style="left: 20%; --duration: 16s; animation-delay: 5s;"></div>
            <div class="particle" style="left: 80%; --duration: 13s; animation-delay: 7s;"></div>
            <div class="particle" style="left: 50%; --duration: 19s; animation-delay: 0.5s;"></div>
            <div class="particle" style="left: 33%; --duration: 17s; animation-delay: 4.5s;"></div>
        </div>

        <section class="hero-content" id="hero-content">
            <h1 id="main-title">
                SAWUBONA, <br>WORLD<span class="exclamation" id="dot">!</span>
            </h1>
            <div class="flag-line" id="flag-line"></div>
            <p class="subtitle" id="subtitle">
                A greeting from Mzansi 🇿🇦
            </p>
        </section>

        <div class="wave-container">
            <svg viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
                <defs>
                    <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
                </defs>
                <g class="waves">
                    <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(255,255,255,0.2)" />
                    <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(255,255,255,0.1)" />
                    <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(255,255,255,0.05)" />
                </g>
            </svg>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline({ defaults: { ease: "power3.out", duration: 1.2 } });

            tl.from("#main-title", { y: 60, opacity: 0, skewY: 2, duration: 1.5 })
              .from("#flag-line", { width: 0, opacity: 0, duration: 1 }, "-=0.8")
              .from("#subtitle", { y: 20, opacity: 0, duration: 1 }, "-=0.6")
              .from("#dot", { scale: 0, rotation: 45, y: -50, ease: "bounce.out", duration: 1 }, "-=0.4");

            document.addEventListener("mousemove", (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.015;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.015;
                gsap.to(".bg-wrapper", { x: moveX, y: moveY, duration: 2, ease: "power2.out" });
            });
        });
    </script>
</body>
</html>
